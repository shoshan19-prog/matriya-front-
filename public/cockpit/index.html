<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MATRIYA — Cockpit</title>
<style>
  :root { --bg:#0b1220; --panel:#131c2e; --line:#243149; --ink:#e6edf6; --dim:#8fa2bd;
          --green:#2ec16b; --amber:#f4b740; --grey:#6b7a92; --red:#e2565b; --accent:#4aa8ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  header .flag { color:var(--dim); font-size:12px; }
  nav { display:flex; gap:6px; padding:10px 16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  nav button { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px;
               padding:8px 14px; cursor:pointer; font-size:14px; }
  nav button.active { border-color:var(--accent); color:#fff; }
  main { padding:18px; max-width:1100px; margin:0 auto; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .card h3 { margin:0 0 10px; font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; }
  .big { font-size:22px; font-weight:600; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { padding:4px 10px; border-radius:999px; font-size:13px; border:1px solid var(--line); }
  .ok { background:rgba(46,193,107,.15); border-color:var(--green); color:#b8f2d0; }
  .badge { display:inline-block; padding:6px 14px; border-radius:8px; font-weight:700; }
  .badge.PASS { background:rgba(46,193,107,.18); color:#b8f2d0; border:1px solid var(--green); }
  .badge.STOP { background:rgba(244,183,64,.16); color:#ffe3a3; border:1px solid var(--amber); }
  .bar { height:10px; border-radius:6px; background:#1d2740; overflow:hidden; margin:4px 0 10px; }
  .bar > span { display:block; height:100%; }
  .row { display:flex; justify-content:space-between; font-size:14px; margin:2px 0; }
  .muted { color:var(--dim); font-size:13px; }
  .btns { display:flex; gap:10px; margin-top:6px; }
  .btns button { flex:1; padding:10px; border-radius:8px; border:1px solid var(--line); cursor:pointer; font-size:14px; background:#182238; color:var(--ink); }
  .btns .accept { border-color:var(--green); } .btns .reject { border-color:#e2565b; } .btns .evidence { border-color:var(--accent); }
  ul.q { margin:6px 0 0; padding-inline-start:18px; } ul.q li { margin:4px 0; font-size:14px; }
  /* timeline */
  .tl { position:relative; padding-inline-start:22px; }
  .tl::before { content:""; position:absolute; inset-inline-start:6px; top:6px; bottom:6px; width:2px; background:var(--line); }
  .tl .item { position:relative; margin:0 0 16px; }
  .tl .item::before { content:""; position:absolute; inset-inline-start:-20px; top:4px; width:11px; height:11px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
  .tl .lab { font-size:12px; color:var(--accent); }
  .tl .ev { font-size:15px; font-weight:600; }
  .tl .dl { font-size:13px; color:var(--dim); }
  /* graph */
  .graphwrap { display:grid; grid-template-columns:2fr 1fr; gap:14px; }
  svg { width:100%; height:420px; background:#0e1626; border:1px solid var(--line); border-radius:12px; }
  .legend span { font-size:12px; margin-inline-end:12px; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-inline-end:5px; vertical-align:middle; }
  .detail h4 { margin:6px 0; font-size:14px; }
  .detail .k { color:var(--dim); font-size:12px; text-transform:uppercase; margin-top:8px; }
  .detail li { font-size:13px; }
  .concept { text-align:center; }
  .toast { position:fixed; inset-block-end:18px; inset-inline-start:50%; transform:translateX(50%); background:#182238; border:1px solid var(--accent); color:var(--ink); padding:10px 16px; border-radius:10px; opacity:0; transition:.3s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1>MATRIYA · COCKPIT</h1>
  <span class="flag" id="flag"></span>
</header>
<nav>
  <button data-view="cockpit" class="active">🛩️ Cockpit — עכשיו</button>
  <button data-view="timeline">🕒 Timeline — לאורך זמן</button>
  <button data-view="graph">🗺️ Knowledge Graph — מבנית</button>
  <button data-view="phases">🧊 Phase Diagram</button>
  <button data-view="energy">⚡ Knowledge Energy</button>
  <button data-view="transfer">🔗 Transfer (KTE)</button>
  <button data-view="reactive">🎮 Reactive (game)</button>
</nav>
<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
const SNAPSHOT = {"generated":"cockpit snapshot — projection of existing engines (no new capability)","flag":"illustrative (numeric values reference-class; provenance grounded in real standards)","cockpit":{"project":"APP/PER/MEL Intumescent — Dataset 001","dataFlag":"illustrative","gates":{"G1_humanSubmitter":true,"G2_provenanceConfirmed":true,"G3_evidenceGraded":true,"G4_noInventedChemistry":true,"G5_mbmMappingConfirmed":true,"G6_dualSignoff":true},"promotable":true,"verdict":"STOP","verdictReasons":["surprise cross-flagged against the failure corpus — escalate to Experiment Planner (C.4): o4"],"promotion":"OFF","accuracy":0.75,"observationClasses":{"observation":4,"context":1,"surprise":1,"artifact":0},"topHypothesis":{"route":"app:solid → app:polyphosphoric_acid → app:char","mri":0.4041,"epistemic":"Corroborated"},"proposedHypothesis":{"text":"char oxidation near 350 °C (unexpected endotherm)","epistemic":"Hypothesized","adversarial":"fail_app_char_oxidation"},"nextExperiment":"Increase DSC/TGA sampling 330–360 °C (in air) to resolve the 350 °C surprise","coPilotQuestions":["does the DSC show the compensating entropy/enthalpy change expected along app:solid → app:polyphosphoric_acid → app:char?","no observation near 280 °C for \"crosslinking route\" — was this step present under these conditions?","unexpected endotherm at 350 °C — which mechanism produces it?"]},"graph":{"nodes":[{"id":"app:solid","label":"solid"},{"id":"app:polyphosphoric_acid","label":"polyphosphoric_acid"},{"id":"app:char","label":"char"},{"id":"app:crosslinked","label":"crosslinked"},{"id":"app:char_oxidized","label":"char_oxidized"}],"edges":[{"from":"app:solid","to":"app:polyphosphoric_acid","id":"app_ppa1","mechanism":"polyphosphoric acid formation","status":"observed","tier":"grounded","confidence":0.48,"evidence":["illustrative","EN 13381-8 / ISO 834 (P0.1)"],"deltaK":[],"contradictions":[],"experiments":["TGA/DSC to compare APP activation onset vs binder decomposition onset"],"competingMechanisms":["APP releases polyphosphoric acid before the char-former/binder is ready, so acid is spent before crosslinking"]},{"from":"app:polyphosphoric_acid","to":"app:char","id":"app_ppa2","mechanism":"char formation","status":"mechanism_supported","tier":"grounded","confidence":0.42,"evidence":["illustrative","EN 13381-8 / ISO 834 (P0.1)"],"deltaK":[],"contradictions":[],"experiments":[],"competingMechanisms":[]},{"from":"app:solid","to":"app:crosslinked","id":"app_xl1","mechanism":"crosslinking","status":"mechanism_supported","tier":"strong","confidence":0.42,"evidence":["illustrative"],"deltaK":[],"contradictions":[],"experiments":[],"competingMechanisms":[]},{"from":"app:crosslinked","to":"app:char","id":"app_xl2","mechanism":"char formation (hypothesized route)","status":"hypothesized","tier":"inferred","confidence":0.15,"evidence":[],"deltaK":[],"contradictions":[],"experiments":["vary crosslinker ratio; SEM of char morphology + cohesion test"],"competingMechanisms":["insufficient crosslink density yields a friable char with poor cohesive strength"]},{"from":"app:solid","to":"app:char","id":"app_direct","mechanism":"direct charring (coarse)","status":"hypothesized","tier":"inferred","confidence":0.15,"evidence":[],"deltaK":[],"contradictions":[],"experiments":["expansion-ratio vs loading study; cone calorimeter"],"competingMechanisms":["too little blowing agent relative to char former gives low expansion and a thin insulating layer"]},{"from":"app:char","to":"app:char_oxidized","id":"fail_app_char_oxidation","mechanism":"oxidative char consumption","status":"candidate_new","tier":"inferred","confidence":null,"evidence":["scientific_paper"],"deltaK":["new state app:char_oxidized"],"contradictions":["conservation_of_mass"],"experiments":["TGA in air to measure char oxidation onset and rate"],"competingMechanisms":[]}],"legend":{"grounded":"green — sourced/standard","strong":"yellow — observed / mechanism-supported","inferred":"grey — inferred / hypothesized"}},"timeline":{"kind":"knowledge-position (build history — real)","note":"Per-formulation history (supplier change → measurement → ΔK) populates once real datasets flow through P0.1. These are the model-knowledge milestones of the build.","events":[{"label":"Ontology v1.0","event":"Material Behavior Model defined","delta":"states + transitions + 5 invariants"},{"label":"v1.0 → v1.1","event":"falsified by the stress test","delta":"added driver families, unknown/impossible, entropy"},{"label":"Stage B/C","event":"reliability + scientific reasoning loop","delta":"MRI, uncertainty, info-gain, planner, calibration, RRI"},{"label":"Failure KB","event":"external failure corpus grounded in standards","delta":"+8 competing mechanisms, +9 ΔK"},{"label":"First Flight","event":"Dataset 001 through G1–G6 (gated)","delta":"surprise @350 °C detected"},{"label":"Now","event":"current scientific position","delta":"app:solid → app:polyphosphoric_acid → app:char (Corroborated)"}]},"energy":{"current":{"experiments":3,"cost":5,"time":8,"deltaK":0.4437,"energy":270.453,"efficiency":0.0037},"comparison":{"ranked":[{"name":"lean program","experiments":3,"cost":2,"time":3,"deltaK":0.4437,"energy":40.568,"efficiency":0.0246},{"name":"APP Dataset 001","experiments":3,"cost":5,"time":8,"deltaK":0.4437,"energy":270.453,"efficiency":0.0037},{"name":"brute-force","experiments":40,"cost":3,"time":4,"deltaK":0.4437,"energy":1081.812,"efficiency":0.0009}],"mostEfficient":"lean program","leastEfficient":"brute-force"},"note":"illustrative — real cost/time arrive with lab data"},"phases":{"ladder":["Unknown","Inferred","StrongInferred","Corroborated","Grounded"],"band":{"Grounded":"stable","Confirmed":"stable","Corroborated":"stable","StrongInferred":"metastable","Inferred":"metastable","Unknown":"unstable","Contradiction":"unstable","KnowledgeDebt":"unstable","Refuted":"unstable"},"placed":{"cells":[{"id":"solid→polyphosphoric_acid","phase":"Grounded","band":"stable","rung":4},{"id":"polyphosphoric_acid→char","phase":"Grounded","band":"stable","rung":4},{"id":"solid→crosslinked","phase":"StrongInferred","band":"metastable","rung":2},{"id":"crosslinked→char","phase":"Inferred","band":"metastable","rung":1},{"id":"solid→char","phase":"Inferred","band":"metastable","rung":1},{"id":"char→char_oxidized","phase":"Contradiction","band":"unstable","rung":-1}],"counts":{"stable":2,"metastable":3,"unstable":1}},"law":"Knowledge moves only through adjacent phase transitions — an Observation never jumps to Grounded.","lawExamples":[{"move":"Inferred → Grounded","legal":false},{"move":"Inferred → StrongInferred","legal":true},{"move":"Grounded → Contradiction","legal":true}]},"transfer":{"domainSignature":{"name":"Fire Retardants (APP)","sequence":["Observation","Contradiction","Boundary","NewModel","Law"]},"candidates":[{"name":"Biology (illustrative)","sequence":["Observation","Contradiction","Boundary","NewModel","Law"],"similarity":1,"transferCandidate":true,"kind":"structural-similarity-only","disclaimer":"Structural similarity is NOT proof of causal similarity. This is a TRANSFER CANDIDATE for human review — never a prediction, never a transferred conclusion."}]}};
const S = SNAPSHOT, main = document.getElementById('main');
document.getElementById('flag').textContent = S.flag || '';
const esc = (x) => String(x==null?'':x);
const toast = (m) => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); };

function cockpit() {
  const c = S.cockpit;
  const gates = Object.entries(c.gates).map(([g,v])=>`<span class="chip ${v?'ok':''}">${g.split('_')[0]} ${v?'✓':'✗'}</span>`).join('');
  const oc = c.observationClasses, tot = Math.max(1, oc.observation+oc.context+oc.surprise+oc.artifact);
  const bar = (label,n,color)=>`<div class="row"><span>${label}</span><span>${n}</span></div><div class="bar"><span style="width:${100*n/tot}%;background:${color}"></span></div>`;
  return `
  <div class="card" style="margin-bottom:14px">
    <div class="row"><div class="big">${esc(c.project)}</div><span class="badge ${c.verdict}">${c.verdict}</span></div>
    <div class="muted">data: ${esc(c.dataFlag)} · promotion: <b>${c.promotion}</b> · accuracy: ${(c.accuracy*100).toFixed(0)}%</div>
  </div>
  <div class="grid">
    <div class="card"><h3>Flight Status — G1–G6</h3><div class="chips">${gates}</div>
      <div class="muted" style="margin-top:10px">promotable: <b>${c.promotable}</b></div>
      ${c.verdictReasons&&c.verdictReasons.length?`<div class="muted" style="margin-top:6px">reason: ${esc(c.verdictReasons[0])}</div>`:''}
    </div>
    <div class="card"><h3>Observations — ${tot}</h3>
      ${bar('Observation',oc.observation,'#4aa8ff')}
      ${bar('Context',oc.context,'#f4b740')}
      ${bar('Surprise',oc.surprise,'#e2565b')}
      ${bar('Artifact',oc.artifact,'#6b7a92')}
    </div>
    <div class="card"><h3>Proposed Hypothesis</h3>
      ${c.proposedHypothesis?`<div class="big" style="font-size:17px">${esc(c.proposedHypothesis.text)}</div>
        <div class="muted">confidence: ${esc(c.proposedHypothesis.epistemic)}${c.proposedHypothesis.adversarial?` · corpus: ${esc(c.proposedHypothesis.adversarial)}`:''}</div>`:'<div class="muted">none</div>'}
      ${c.topHypothesis?`<div class="muted" style="margin-top:8px">leading route: ${esc(c.topHypothesis.route)} (MRI ${c.topHypothesis.mri}, ${esc(c.topHypothesis.epistemic)})</div>`:''}
    </div>
    <div class="card"><h3>Next Experiment</h3><div class="big" style="font-size:16px">${esc(c.nextExperiment)}</div></div>
    <div class="card" style="grid-column:1/-1"><h3>Co-pilot — what it needs to know</h3>
      <ul class="q">${c.coPilotQuestions.map(q=>`<li>${esc(q)}</li>`).join('')}</ul></div>
    <div class="card" style="grid-column:1/-1"><h3>Human Decision</h3>
      <div class="btns">
        <button class="accept" onclick="decide('Accept')">Accept</button>
        <button class="reject" onclick="decide('Reject')">Reject</button>
        <button class="evidence" onclick="decide('Need Evidence')">Need Evidence</button>
      </div>
      <div class="muted" style="margin-top:8px">הכפתורים מתעדים מקומית בלבד. אינטגרציה אמיתית שולחת לתור הסקירה (G6) — המנוע לעולם לא משנה את המודל אוטונומית.</div>
    </div>
  </div>`;
}
function decide(x){ try{ localStorage.setItem('cockpit.decision.'+(S.cockpit.project||'p'), JSON.stringify({decision:x,at:new Date().toISOString()})); }catch(e){} toast('נרשם מקומית: '+x+' — יישלח לתור הסקירה האנושית (G6).'); }

function timeline() {
  const t = S.timeline;
  return `<div class="card"><h3>${esc(t.kind)}</h3><div class="muted" style="margin-bottom:14px">${esc(t.note)}</div>
    <div class="tl">${t.events.map(e=>`<div class="item"><div class="lab">${esc(e.label)}</div><div class="ev">${esc(e.event)}</div><div class="dl">Δ ${esc(e.delta)}</div></div>`).join('')}</div></div>`;
}

function graph() {
  const g = S.graph, W=640, H=420, pad=60;
  // layered layout by BFS depth from the node with no incoming edge
  const incoming = {}; g.nodes.forEach(n=>incoming[n.id]=0); g.edges.forEach(e=>incoming[e.to]=(incoming[e.to]||0)+1);
  const roots = g.nodes.filter(n=>!incoming[n.id]).map(n=>n.id);
  const depth={}; (roots.length?roots:[g.nodes[0].id]).forEach(r=>depth[r]=0);
  let changed=true, guard=0; while(changed&&guard++<50){ changed=false; g.edges.forEach(e=>{ if(depth[e.from]!=null){ const d=depth[e.from]+1; if(depth[e.to]==null||depth[e.to]<d){depth[e.to]=d;changed=true;} } }); }
  g.nodes.forEach(n=>{ if(depth[n.id]==null) depth[n.id]=0; });
  const cols={}; g.nodes.forEach(n=>{ (cols[depth[n.id]]=cols[depth[n.id]]||[]).push(n.id); });
  const maxD=Math.max(...Object.keys(cols).map(Number));
  const pos={}; Object.entries(cols).forEach(([d,ids])=>{ ids.forEach((id,i)=>{ pos[id]={ x:pad+(maxD? (W-2*pad)*d/maxD:0), y:pad+(H-2*pad)*(i+.5)/ids.length }; }); });
  const col={grounded:'#2ec16b',strong:'#f4b740',inferred:'#6b7a92'};
  const edgesSVG=g.edges.map((e,i)=>{ const a=pos[e.from],b=pos[e.to]; if(!a||!b)return''; const c=col[e.tier]||'#6b7a92';
    return `<g style="cursor:pointer" onclick="edgeDetail(${i})"><line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${c}" stroke-width="2.5" marker-end="url(#arrow-${e.tier})"/></g>`; }).join('');
  const nodesSVG=g.nodes.map(n=>{ const p=pos[n.id]; return `<g><circle cx="${p.x}" cy="${p.y}" r="26" fill="#182238" stroke="#31415f"/><text x="${p.x}" y="${p.y+4}" fill="#e6edf6" font-size="11" text-anchor="middle">${esc(n.label)}</text></g>`; }).join('');
  const defs=['grounded','strong','inferred'].map(t=>`<marker id="arrow-${t}" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="${col[t]}"/></marker>`).join('');
  return `<div class="graphwrap">
    <div><svg viewBox="0 0 ${W} ${H}"><defs>${defs}</defs>${edgesSVG}${nodesSVG}</svg>
      <div class="legend" style="margin-top:8px">
        <span><i class="dot" style="background:${col.grounded}"></i>Grounded</span>
        <span><i class="dot" style="background:${col.strong}"></i>Strong inferred</span>
        <span><i class="dot" style="background:${col.inferred}"></i>Inferred</span>
      </div></div>
    <div class="card detail" id="edgeDetail"><h3>Edge detail</h3><div class="muted">בחר קשת בגרף כדי לראות ראיות, ΔK, סתירות וניסויים.</div></div>
  </div>`;
}
function edgeDetail(i){ const e=S.graph.edges[i]; const list=(a)=>a&&a.length?`<ul>${a.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'<div class="muted">—</div>';
  document.getElementById('edgeDetail').innerHTML=`<h3>${esc(e.from)} → ${esc(e.to)}</h3>
    <div class="muted">${esc(e.mechanism)} · status: ${esc(e.status)} · tier: ${esc(e.tier)}${e.confidence!=null?` · c=${e.confidence}`:''}</div>
    <div class="k">Evidence</div>${list(e.evidence)}
    <div class="k">Competing mechanisms</div>${list(e.competingMechanisms)}
    <div class="k">ΔK</div>${list(e.deltaK)}
    <div class="k">Contradictions</div>${list(e.contradictions)}
    <div class="k">Experiments</div>${list(e.experiments)}`; }

function phasediagram(){
  const p=S.phases; if(!p) return '<div class="card">no phase data</div>';
  const bands=[['stable','#2ec16b','Stable — Confirmed · Corroborated · Grounded'],['metastable','#f4b740','Metastable — Strong Inferred · Inferred'],['unstable','#e2565b','Unstable — Contradiction · Unknown · Debt']];
  const cellsFor=(b)=>p.placed.cells.filter(c=>c.band===b).map(c=>`<span class="chip" title="${esc(c.phase)}">${esc(c.id)} · ${esc(c.phase)}</span>`).join(' ')||'<span class="muted">—</span>';
  const laws=p.lawExamples.map(l=>`<div class="row"><span>${esc(l.move)}</span><span style="color:${l.legal?'#2ec16b':'#e2565b'}">${l.legal?'legal ✓':'ILLEGAL ✗'}</span></div>`).join('');
  return `<div class="card" style="margin-bottom:14px"><h3>Knowledge Phase Diagram</h3>
    <div class="muted" style="margin-bottom:10px">מצב הידע כפאזות. חוק: ${esc(p.law)}</div>
    ${bands.map(([b,c,t])=>`<div class="card" style="border-color:${c}22;margin-bottom:10px"><div style="color:${c};font-size:13px;margin-bottom:6px">${t}</div><div class="chips">${cellsFor(b)}</div></div>`).join('')}
  </div>
  <div class="card"><h3>The no-jump law</h3><div class="muted" style="margin-bottom:8px">ידע עולה רק דרג אחד בכל פעם; הפרכה יכולה להפיל בכל עוצמה.</div>${laws}
    <div style="margin-top:10px" class="chips">${p.ladder.map((r,i)=>`<span class="chip">${i}. ${esc(r)}</span>`).join(' → ')}</div></div>`;
}

function energy(){
  const e=S.energy; if(!e) return '<div class="card">no energy data</div>';
  const max=Math.max(...e.comparison.ranked.map(r=>r.energy));
  const rows=e.comparison.ranked.map(r=>`<div class="row"><span>${esc(r.name)}</span><span>${r.energy}</span></div><div class="bar"><span style="width:${100*r.energy/max}%;background:${r.name===e.comparison.mostEfficient?'#2ec16b':'#f4b740'}"></span></div><div class="muted" style="margin-top:-6px">exp ${r.experiments} · cost ${r.cost} · time ${r.time} · ΔK ${r.deltaK}</div>`).join('');
  return `<div class="grid">
    <div class="card"><h3>Knowledge Energy — current</h3><div class="big">${e.current.energy}</div>
      <div class="muted">= (experiments × cost × time) / ΔK &nbsp; → נמוך = יעיל</div>
      <div class="muted" style="margin-top:8px">exp ${e.current.experiments} · cost ${e.current.cost} · time ${e.current.time} · ΔK ${e.current.deltaK}</div></div>
    <div class="card"><h3>Comparison (illustrative)</h3>${rows}<div class="muted" style="margin-top:6px">most efficient: <b>${esc(e.comparison.mostEfficient)}</b></div></div>
  </div>`;
}

function transfer(){
  const t=S.transfer; if(!t) return '<div class="card">no transfer data</div>';
  const sig=(s)=>s.map(x=>`<span class="chip">${esc(x)}</span>`).join(' → ');
  return `<div class="card" style="margin-bottom:14px"><h3>Domain signature — ${esc(t.domainSignature.name)}</h3><div class="chips">${sig(t.domainSignature.sequence)}</div></div>
    ${t.candidates.map(c=>`<div class="card"><div class="row"><h3 style="margin:0">${esc(c.name)}</h3><span class="badge ${c.transferCandidate?'PASS':'STOP'}">${c.transferCandidate?'TRANSFER CANDIDATE':'no match'}</span></div>
      <div class="chips" style="margin:8px 0">${sig(c.sequence)}</div>
      <div class="muted">structural similarity: ${c.similarity} · kind: ${esc(c.kind)}</div>
      <div class="muted" style="margin-top:8px;color:#f4b740">⚠ ${esc(c.disclaimer)}</div></div>`).join('')}`;
}

let reactiveTimer=null;
function reactive(){
  setTimeout(initReactive,30);
  return `<div class="card concept"><h3>Reactive — intumescent simulation (illustrative game)</h3>
  <div class="muted" style="margin-bottom:10px">גרור את הטמפרטורה או לחץ Play. סכמטי בלבד — לא מדידה. חוצה 350°C ← מופיע ה-Surprise (STOP → אדם).</div>
  <div class="row" style="align-items:center;gap:12px"><button id="rxPlay" class="chip">▶ Play</button>
    <input id="rxTemp" type="range" min="20" max="600" value="20" style="flex:1"/>
    <span id="rxTval" class="chip">20 °C</span></div>
  <svg viewBox="0 0 640 300" style="margin-top:10px;height:300px">
    <defs><linearGradient id="flame" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#e2565b"/><stop offset="1" stop-color="#f4b740"/></linearGradient></defs>
    <rect x="40" y="250" width="560" height="20" fill="#31415f"/><text x="320" y="292" fill="#8fa2bd" font-size="12" text-anchor="middle">substrate</text>
    <g id="rxFlames"></g>
    <rect id="rxCoat" x="150" y="200" width="340" height="50" fill="#4aa8ff"/>
    <text id="rxPhase" x="320" y="40" fill="#e6edf6" font-size="14" text-anchor="middle"></text>
    <text id="rxStage" x="320" y="64" fill="#8fa2bd" font-size="12" text-anchor="middle"></text>
    <text id="rxSurprise" x="320" y="90" fill="#e2565b" font-size="13" text-anchor="middle" opacity="0"></text>
  </svg></div>`;
}
function initReactive(){
  const temp=document.getElementById('rxTemp'), val=document.getElementById('rxVal')||document.getElementById('rxTval');
  const coat=document.getElementById('rxCoat'), phase=document.getElementById('rxPhase'), stage=document.getElementById('rxStage'), sur=document.getElementById('rxSurprise'), flames=document.getElementById('rxFlames'), play=document.getElementById('rxPlay');
  if(!temp) return;
  function draw(T){
    val.textContent=T+' °C';
    // stage + phase by temperature (illustrative, matches app: route)
    let s='solid', ph='Grounded', col='#4aa8ff', h=50, y=200;
    if(T>=200&&T<300){s='volatilisation / acid onset';ph='StrongInferred';col='#f4b740';h=58;y=192;}
    else if(T>=300&&T<340){s='polyphosphoric acid → char';ph='Corroborated';col='#8a5a2b';h=95;y=155;}
    else if(T>=340){s='char (expanded)';ph='Grounded';col='#5a3a22';h=150;y=100;}
    coat.setAttribute('fill',col); coat.setAttribute('height',h); coat.setAttribute('y',y);
    phase.textContent='phase: '+ph; stage.textContent=s;
    // flames scale with T
    const n=Math.max(0,Math.round((T-100)/60)); let f='';
    for(let i=0;i<n;i++){const x=120+i*45; f+=`<path d="M${x},250 q8,-30 0,-46 q16,16 8,46 z" fill="url(#flame)" opacity="0.8"/>`;}
    flames.innerHTML=f;
    // the surprise at 350
    if(T>=350){ sur.setAttribute('opacity','1'); sur.textContent='⚠ SURPRISE: char oxidation near 350°C → STOP (human review)'; }
    else sur.setAttribute('opacity','0');
  }
  temp.oninput=()=>{ if(reactiveTimer){clearInterval(reactiveTimer);reactiveTimer=null;play.textContent='▶ Play';} draw(+temp.value); };
  play.onclick=()=>{ if(reactiveTimer){clearInterval(reactiveTimer);reactiveTimer=null;play.textContent='▶ Play';return;} play.textContent='⏸ Pause';
    reactiveTimer=setInterval(()=>{ let v=+temp.value+8; if(v>600)v=20; temp.value=v; draw(v); },120); };
  draw(20);
}

const views={cockpit,timeline,graph,phases:phasediagram,energy,transfer,reactive};
function render(v){ if(reactiveTimer){clearInterval(reactiveTimer);reactiveTimer=null;} main.innerHTML=views[v](); document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); }
document.querySelectorAll('nav button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.view)));
render('cockpit');
</script>
</body>
</html>
