name: CI

# The signal the CI Sweeper loop watches. Keep this green; when it goes red,
# run `/loop-ci-sweeper` (see loops/patterns/ci-sweeper.md).

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        run: npm run build
